name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Elevate.Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Elevate.Web/package-lock.json

      - name: Install dependencies (ignore peer conflicts)
        run: npm ci --legacy-peer-deps

      - name: Check SEO metadata
        run: npm run check:seo

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          REQUIRE_API_ROUTES: 'true'
          VITE_DIRECT_LINE_SECRET: ${{ secrets.DIRECT_LINE_SECRET }}
          VITE_BOT_TOKEN_ENDPOINT: ${{ secrets.VITE_BOT_TOKEN_ENDPOINT }}
          VITE_CLARITY_ENABLED: ${{ vars.VITE_CLARITY_ENABLED || 'true' }}
          VITE_CLARITY_PROJECT_ID: ${{ secrets.VITE_CLARITY_PROJECT_ID }}
          VITE_BUILD_ID: ${{ github.sha }}

      - name: Include CNAME
        run: cp ../CNAME dist/

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Elevate.Web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed pages and assets
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://microsoft-elevate.com"
          routes=("/" "/m365" "/program-news")

          fetch_route() {
            local url="$1"
            local html_file="$2"
            curl -sS -L -o "${html_file}" -w "%{http_code}" "${url}"
          }

          for route in "${routes[@]}"; do
            url="${base_url}${route}"
            html_file="$(mktemp)"
            status=""

            for attempt in 1 2 3; do
              status="$(fetch_route "${url}" "${html_file}")"
              if [[ "${status}" == "200" ]]; then
                break
              fi
              sleep 10
            done

            if [[ "${status}" != "200" ]]; then
              echo "::error::${url} returned HTTP ${status}"
              exit 1
            fi

            mapfile -t assets < <(grep -Eo '/assets/[^"]+\.(js|css)' "${html_file}" | sort -u)
            if [[ "${#assets[@]}" -eq 0 ]]; then
              echo "::error::${url} did not reference built JS/CSS assets"
              exit 1
            fi

            for asset in "${assets[@]}"; do
              asset_status="$(curl -sS -L -o /dev/null -w "%{http_code}" "${base_url}${asset}")"
              if [[ "${asset_status}" != "200" ]]; then
                echo "::error::${url} references ${asset}, which returned HTTP ${asset_status}"
                exit 1
              fi
            done
          done

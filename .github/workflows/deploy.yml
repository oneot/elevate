name: Build for GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Elevate.Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Elevate.Web/package-lock.json

      - name: Install dependencies (ignore peer conflicts)
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_DIRECT_LINE_SECRET: ${{ secrets.DIRECT_LINE_SECRET }}
          VITE_CLARITY_ENABLED: ${{ vars.VITE_CLARITY_ENABLED || 'true' }}
          VITE_CLARITY_PROJECT_ID: ${{ secrets.VITE_CLARITY_PROJECT_ID }}

      - name: Include CNAME
        run: cp ../CNAME dist/

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: Elevate.Web/dist

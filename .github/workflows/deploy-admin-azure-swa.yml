name: Deploy Elevate.Admin To Azure Static Web Apps

on:
    push:
        branches: [admin]
        paths:
            - "Elevate.Admin/**"
            - ".github/workflows/deploy-admin-azure-swa.yml"
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: deploy-admin-azure-swa-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: Elevate.Admin/package-lock.json

            - name: Install dependencies
              working-directory: Elevate.Admin
              run: npm install --legacy-peer-deps

            - name: Validate build env secrets
              env:
                  VITE_API_BASE_URL: ${{ secrets.ADMIN_VITE_API_BASE_URL }}
                  VITE_AZURE_AD_CLIENT_ID: ${{ secrets.ADMIN_VITE_AZURE_AD_CLIENT_ID }}
                  VITE_AZURE_AD_AUTHORITY: ${{ secrets.ADMIN_VITE_AZURE_AD_AUTHORITY }}
                  VITE_AZURE_AD_REDIRECT_URI: ${{ secrets.ADMIN_VITE_AZURE_AD_REDIRECT_URI }}
                  VITE_AZURE_AD_API_SCOPE: ${{ secrets.ADMIN_VITE_AZURE_AD_API_SCOPE }}
              run: |
                  test -n "$VITE_API_BASE_URL"
                  test -n "$VITE_AZURE_AD_CLIENT_ID"
                  test -n "$VITE_AZURE_AD_AUTHORITY"
                  test -n "$VITE_AZURE_AD_REDIRECT_URI"
                  test -n "$VITE_AZURE_AD_API_SCOPE"

            - name: Build
              working-directory: Elevate.Admin
              env:
                  VITE_API_BASE_URL: ${{ secrets.ADMIN_VITE_API_BASE_URL }}
                  VITE_AZURE_AD_CLIENT_ID: ${{ secrets.ADMIN_VITE_AZURE_AD_CLIENT_ID }}
                  VITE_AZURE_AD_AUTHORITY: ${{ secrets.ADMIN_VITE_AZURE_AD_AUTHORITY }}
                  VITE_AZURE_AD_REDIRECT_URI: ${{ secrets.ADMIN_VITE_AZURE_AD_REDIRECT_URI }}
                  VITE_AZURE_AD_API_SCOPE: ${{ secrets.ADMIN_VITE_AZURE_AD_API_SCOPE }}
              run: npm run build

            - name: Deploy to Azure Static Web Apps
              id: deployswa
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: Elevate.Admin/dist
                  api_location: ""
                  skip_app_build: true
